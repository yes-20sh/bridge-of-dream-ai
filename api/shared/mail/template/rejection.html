<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .shimmer-loader {
            background: linear-gradient(90deg, #f4f4f5 25%, #e4e4e7 50%, #f4f4f5 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #fafafa; padding: 40px 20px;">
        <tr>
            <td align="center">
                <table role="presentation" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border: 1px solid #e4e4e7; border-radius: 12px; padding: 40px 32px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);">
                    <tr>
                        <td align="center">
                            <div class="shimmer-loader" style="width: 64px; height: 64px; margin: 0 auto 24px; border-radius: 50%; overflow: hidden;">
                                <img src="{logo_url}" alt="Logo" style="width: 100%; height: 100%; object-fit: cover;">
                            </div>
                            <h2 style="font-size: 24px; font-weight: 800; margin: 0 0 12px; color: #18181b;">Update Regarding Access</h2>
                            <p style="font-size: 14px; color: #71717a; line-height: 1.6; margin: 0 0 24px; text-align: left;">Hello {name},<br><br>Thank you for your interest in our platform. Unfortunately, after reviewing your request, we are unable to grant you access at this time.</p>
                            
                            <div style="font-size: 12px; color: #a1a1aa; border-top: 1px solid #e4e4e7; padding-top: 24px; margin-top: 24px;">
                                Best Regards,<br>
                                <strong style="color: #18181b;">Yashraj Singh Solanki</strong><br>
                                Bridge of Dream AI Team<br>
                                <a href="https://www.linkedin.com/in/yes20sh" target="_blank" style="color: #0077b5; text-decoration: none; font-weight: 600; display: inline-block; margin-top: 8px;">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/ca/LinkedIn_logo_initials.png" alt="LinkedIn" style="width: 14px; height: 14px; vertical-align: middle; margin-right: 6px; border: 0;">Connect on LinkedIn
                                </a>
                            </div>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
