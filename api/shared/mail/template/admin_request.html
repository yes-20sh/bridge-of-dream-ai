<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .shimmer-loader {
            background: linear-gradient(90deg, #f4f4f5 25%, #e4e4e7 50%, #f4f4f5 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #fafafa; padding: 40px 20px;">
        <tr>
            <td align="center">
                <table role="presentation" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border: 1px solid #e4e4e7; border-radius: 12px; padding: 40px 32px; width: 100%; max-width: 450px; text-align: left; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);">
                    <tr>
                        <td>
                            <div class="shimmer-loader" style="width: 64px; height: 64px; margin: 0 auto 24px; border-radius: 50%; overflow: hidden; text-align: center;">
                                <img src="{logo_url}" alt="Logo" style="width: 100%; height: 100%; object-fit: cover;">
                            </div>
                            <h2 style="font-size: 22px; font-weight: 800; margin: 0 0 12px; color: #18181b; text-align: center;">New Access Request</h2>
                            <p style="font-size: 14px; color: #71717a; line-height: 1.6; margin: 0 0 24px; text-align: center;">A new user has requested platform access. Please review their details below.</p>
                            
                            <div style="background-color: #fafafa; border: 1px solid #e4e4e7; border-radius: 8px; padding: 20px; margin-bottom: 28px;">
                                <div style="margin-bottom: 14px; border-bottom: 1px solid #f4f4f5; padding-bottom: 10px;">
                                    <div style="font-size: 11px; font-weight: 700; color: #71717a; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;">Requester Name</div>
                                    <div style="font-size: 14px; font-weight: 600; color: #18181b;">{name}</div>
                                </div>
                                <div style="margin-bottom: 14px; border-bottom: 1px solid #f4f4f5; padding-bottom: 10px;">
                                    <div style="font-size: 11px; font-weight: 700; color: #71717a; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;">Email Address</div>
                                    <div style="font-size: 14px; font-weight: 600; color: #18181b;">{email}</div>
                                </div>
                                <div style="margin-bottom: 14px; border-bottom: 1px solid #f4f4f5; padding-bottom: 10px;">
                                    <div style="font-size: 11px; font-weight: 700; color: #71717a; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;">Mobile Number</div>
                                    <div style="font-size: 14px; font-weight: 600; color: #18181b;">{mobile_number}</div>
                                </div>
                                <div>
                                    <div style="font-size: 11px; font-weight: 700; color: #71717a; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;">Description / Message</div>
                                    <div style="font-size: 14px; color: #27272a; line-height: 1.5; font-style: italic;">"{description}"</div>
                                </div>
                            </div>

                            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin-bottom: 24px;">
                                <tr>
                                    <td width="48%">
                                        <a href="{backend_url}/api/requests/email-action?request_id={request_id}&approve=true" style="display: block; padding: 8px 0; background-color: #18181b; color: #ffffff; text-decoration: none; font-weight: 600; font-size: 12px; border-radius: 6px; text-align: center; border: 1px solid #18181b; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">Approve</a>
                                    </td>
                                    <td width="4%"></td>
                                    <td width="48%">
                                        <a href="{backend_url}/api/requests/email-action?request_id={request_id}&approve=false" style="display: block; padding: 8px 0; background-color: #ffffff; color: #18181b; text-decoration: none; font-weight: 600; font-size: 12px; border-radius: 6px; text-align: center; border: 1px solid #e4e4e7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">Reject</a>
                                    </td>
                                </tr>
                            </table>
                            
                            <div style="font-size: 12px; color: #a1a1aa; text-align: center; border-top: 1px solid #e4e4e7; padding-top: 20px;">
                                Bridge of Dream AI Platform Notification
                            </div>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
